substitutions:
  stepper_endstop: '11500'
  
esphome:
  name: casa-turtle
  friendly_name: Casa Turtle
  
  on_boot:
      - priority: -200.0
        then:
          # Stepper starts out with a target and current position of 0 on boot. Restore state.
          - stepper.report_position:
              id: stepper_motor
              position: !lambda return int($stepper_endstop * id(blinds_cover).position);
          - stepper.set_target:
              id: stepper_motor
              target: !lambda return int($stepper_endstop * id(blinds_cover).position);  

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "BcnV2cXbeBUfM0mesGVmv8lYcmdCK5oso0IamPzlFP8="
  actions:
    - action: lueften
      variables:
        air_time: int    
      then:
      - climate.control:
          id: climatecontroll
          mode: FAN_ONLY
      - delay: !lambda "return air_time;"
      - fan.turn_off: fan_climate
      - climate.control:
          id: climatecontroll
          mode: HEAT_COOL
          fan_mode: AUTO


ota:
  - platform: esphome
    password: "c1cf154cb608e0eb39e40da612635818"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Casa-Turtle Fallback Hotspot"
    password: "xgaH68VQK8q4"

captive_portal:

number:
  - platform: template
    name: "Lüftungsdauer"
    id: duration_ventilate
    optimistic: true
    min_value: 1
    max_value: 30
    step: 1

climate:
  - platform: thermostat
    name: "Temperaturregelung"
    sensor: bme280_temperature
    id: climatecontroll
    heat_cool_mode: true
    humidity_sensor: bme280_humidity
    min_cooling_off_time: 60s #300s
    min_cooling_run_time: 60s #300s
    min_heating_off_time: 60s #300s
    min_heating_run_time: 60s #300s
    min_fanning_off_time: 30s #300s
    min_fanning_run_time: 30s #300s
    min_idle_time: 3s
    visual: 
      min_temperature: 0
      temperature_step: 0.5
      min_humidity: 30%
      max_humidity: 99%      
    cool_action:
      - switch.turn_off: switch_heat
      - cover.open: cover_Luftungstur
      - cover.open: cover_Klapptur
      - cover.open: cover_Wintergarten
#      - wait_until:
#          condition:
#            lambda: return (id(cover_Luftungstur).position == COVER_OPEN);      
      - wait_until:
          condition:
            lambda: 'return !isnan(id(cover_Luftungstur).position) && id(cover_Luftungstur).position > 0.95;'
          timeout: 20s
      - fan.turn_on: fan_climate
    heat_action:
      - fan.turn_off: fan_climate
      - switch.turn_on: switch_heat
      - cover.close: cover_Luftungstur          
    fan_only_action:
      - switch.turn_off: switch_heat
      - cover.open: cover_Luftungstur
      - cover.open: cover_Klapptur
      - cover.open: cover_Wintergarten
#      - wait_until:
#          condition:
#            lambda: return (id(cover_Luftungstur).position == COVER_OPEN);   
      - wait_until:
          condition:
            lambda: 'return !isnan(id(cover_Luftungstur).position) && id(cover_Luftungstur).position > 0.95;'
          timeout: 20s               
      - fan.turn_on: fan_climate
    off_mode: 
      then:
        - switch.turn_off: switch_heat
        - fan.turn_off: fan_climate        
    idle_action:
      - logger.log: "idle_action"
      - if:
          condition:
            lambda: 'return id(bme280_temperature).state < id(climatecontroll).target_temperature_low;'
          then:
            - cover.close: cover_Luftungstur     
      - switch.turn_off: switch_heat
      - fan.turn_off: fan_climate
      #- cover.close: cover_Luftungstur
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: 15 °C
        default_target_temperature_high: 25 °C

sensor:
  - platform: bme280_i2c
    temperature:
      name: "Temperatur"
      id: bme280_temperature
      oversampling: 8x
      filters:
        - median:
            window_size: 7
            send_every: 3
            send_first_at: 3
        - lambda: |-
            if (x < -10 || x > 60) return NAN;
            return x;  
        - filter_out: NAN
    humidity:
      name: "rel. Feuchtigkeit"
      id: bme280_humidity
      oversampling: 8x
      filters:
        - median:
            window_size: 7
            send_every: 3
            send_first_at: 3
        - lambda: |-
            if (x < 0 || x > 100) return NAN;
            return x;   
        - filter_out: NAN
    address: 0x76
#  update_interval: 15s
  - platform: absolute_humidity
    name: "Absolute Humidity"
    temperature: bme280_temperature
    humidity: bme280_humidity
  - platform: bme280_i2c
    temperature:
      name: "Temperatur Wintergarten"
      oversampling: 8x
      filters:
        - median:
            window_size: 7
            send_every: 3
            send_first_at: 3
        - lambda: |-
            if (x < -10 || x > 60) return NAN;
            return x;     
        - filter_out: NAN
    humidity:
      name: "rel. Feuchtigkeit Wintergarten" 
      oversampling: 8x
      filters:
        - median:
            window_size: 7
            send_every: 3
            send_first_at: 3
        - lambda: |-
            if (x < 0 || x > 100) return NAN;
            return x;  
        - filter_out: NAN
    address: 0x77    

