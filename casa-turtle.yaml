light:
  - platform: monochromatic
    name: "Beleuchtung"
    output: gpio_led
    id: light_stripe

fan:
  - platform: binary
    output: gpio_fan
    name: "Lüfter"
    id: fan_climate
    entity_category: "config"

cover:
  - platform: time_based
    id: cover_Klapptur
    name: "Klapptür"
    open_action:
      - switch.turn_on: switch_Klapptur_A
      - switch.turn_off: switch_Klapptur_B
    open_duration: 13s
    close_action:
      - switch.turn_off: switch_Klapptur_A
      - switch.turn_on: switch_Klapptur_B
      - light.turn_off: light_stripe
    close_duration: 13s
    stop_action:
      - switch.turn_off: switch_Klapptur_A
      - switch.turn_off: switch_Klapptur_B
    assumed_state: true    
    device_class: garage
    on_closed:
      - cover.close: cover_Luftungstur          
  - platform: time_based
    id: cover_Luftungstur
    name: "Lüftungstür"
    open_action:
      - switch.turn_off: switch_Lueftungstur_A
      - switch.turn_on: switch_Lueftungstur_B
    open_duration: 16s
    close_action:
      - switch.turn_on: switch_Lueftungstur_A
      - switch.turn_off: switch_Lueftungstur_B
    close_duration: 16s
    stop_action:
      - switch.turn_off: switch_Lueftungstur_A
      - switch.turn_off: switch_Lueftungstur_B
    assumed_state: true    
    device_class: door    
  - platform: time_based
    id: cover_Wintergarten
    name: "Wintergartentür"
    open_action:
      - switch.turn_off: switch_Wintergartentur_A
      - switch.turn_on: switch_Wintergartentur_B
    open_duration: 16.5s
    close_action:
      - switch.turn_on: switch_Wintergartentur_A
      - switch.turn_off: switch_Wintergartentur_B
    close_duration: 16.5s
    stop_action:
      - switch.turn_off: switch_Wintergartentur_A
      - switch.turn_off: switch_Wintergartentur_B
    assumed_state: true    
    device_class: garage    
  - platform: time_based
    id: cover_Klappfenster
    name: "Klappfenster"
    open_action:
      - switch.turn_on: switch_Klappfenster_A
      - switch.turn_off: switch_Klappfenster_B
    open_duration: 11s
    close_action:
      - switch.turn_off: switch_Klappfenster_A
      - switch.turn_on: switch_Klappfenster_B
    close_duration: 11s
    stop_action:
      - switch.turn_off: switch_Klappfenster_A
      - switch.turn_off: switch_Klappfenster_B
    assumed_state: true    
    device_class: window            
    internal: true
  - platform: template
    name: "Gardine"
    id: blinds_cover
    open_action:
      then:
        - logger.log: "Opening"
        - script.execute:
            id: blinds_cover_set_position
            pos: 1.0
        - script.wait: blinds_cover_set_position
    close_action:
      then:
        - logger.log: "Closing"
        - script.execute:
            id: blinds_cover_set_position
            pos: 0.0
        - script.wait: blinds_cover_set_position
    position_action:
      then:
        - logger.log: "Positioning"
        - script.execute:
            id: blinds_cover_set_position
            pos: !lambda 'return pos;'
        - script.wait: blinds_cover_set_position
    stop_action:
      then:
        - logger.log: "Stopping"
        - script.execute:
            id: blinds_cover_set_position
            pos: !lambda 'return float(id(stepper_motor).current_position) / $stepper_endstop;'
        - script.wait: blinds_cover_set_position
    has_position: true
    device_class: blind

stepper:
  - platform: a4988
    id: stepper_motor
    step_pin: GPIO18
    dir_pin: 
      number: GPIO19
      inverted: true
    sleep_pin: 
      number: GPIO5
      inverted: true  # using enable pin
    max_speed: 250

script:
  - id: blinds_cover_set_position
    parameters:
      pos: float
    mode: restart
    then:
      - stepper.set_target:
          id: stepper_motor
          target: !lambda return int($stepper_endstop * pos);
      - while:
          condition:
            lambda: 'return id(stepper_motor).current_position != id(stepper_motor).target_position;'
          then:
            - cover.template.publish:
                id: blinds_cover
                position: !lambda 'return float(id(stepper_motor).current_position) / $stepper_endstop;' 
                current_operation: !lambda 'return id(stepper_motor).current_position < id(stepper_motor).target_position ? COVER_OPERATION_OPENING : COVER_OPERATION_CLOSING;'
            - delay: 250 ms
      - cover.template.publish:
          id: blinds_cover
          state: !lambda 'return pos;'
          current_operation: IDLE
  - id: script_lueften
    parameters:
      time: int
    then:
      - logger.log: "The sensor value is below 30!"


button:
  - platform: restart
    name: "Casa Turtle Neustart"
    entity_category: diagnostic  
  - platform: template
    name: "Gardine zurücksetzen"
    id: blinds_reset
    entity_category: "config"
    on_press:
      - script.execute:
          id: blinds_cover_set_position
          pos: 2
      #- script.execute:
      #    id: blinds_cover_set_position
      #    pos: 2.0
      #- script.wait: blinds_cover_set_position
      #- script.execute:
      #    id: blinds_cover_set_position
      #    pos: 0.0
      #- script.wait: blinds_cover_set_position                  
  - platform: template
    name: "Lüften"
    on_press:
      - climate.control:
          id: climatecontroll
          mode: FAN_ONLY
      - delay: !lambda "return id(duration_ventilate).state * 1000 * 60;"
      - fan.turn_off: fan_climate
      - climate.control:
          id: climatecontroll
          mode: HEAT_COOL
          fan_mode: AUTO

