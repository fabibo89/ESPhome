esphome:
  name: gartenhaus
  friendly_name: Gartenhaus

  on_boot:
    priority: -100
    then:
      - script.execute: apply_status_state

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "J1gG6rMwkfGgv3UxfOAy/Xft3a11lLVwP2v3L7PR0qM="

ota:
  - platform: esphome
    password: "b6bae80e6701a199fdca9b1968f3bc9f"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Gartenhaus Fallback Hotspot"
    password: "NRz5OqMI8k8i"

captive_portal:

globals:
  - id: status_active
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: status_led_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: prison_mode
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: blink_running
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: blink_on
    type: bool
    restore_value: no
    initial_value: 'true'

script:
  - id: apply_status_state
    then:
      - binary_sensor.template.publish:
          id: status_binary
          state: !lambda 'return id(status_active);'
      - switch.template.publish:
          id: status_switch
          state: !lambda 'return id(status_active);'
      - if:
          condition:
            lambda: 'return !id(blink_running);'
          then:
            - if:
                condition:
                  lambda: 'return id(status_led_enabled);'
                then:
                  - if:
                      condition:
                        lambda: 'return id(status_active);'
                      then:
                        - light.turn_on: light_green
                        - light.turn_off: light_red
                      else:
                        - light.turn_on: light_red
                        - light.turn_off: light_green
                else:
                  - light.turn_off: light_red
                  - light.turn_off: light_green

  - id: set_status
    parameters:
      new_state: bool
    then:
      - lambda: |-
          id(status_active) = new_state;
      - script.execute: apply_status_state

  - id: set_led_enabled
    parameters:
      new_state: bool
    then:
      - lambda: |-
          id(status_led_enabled) = new_state;
      - script.execute: apply_status_state

  - id: toggle_status
    then:
      - lambda: |-
          id(status_active) = !id(status_active);
      - script.execute: apply_status_state

  - id: start_status_blink
    then:
      - if:
          condition:
            lambda: 'return id(status_led_enabled);'
          then:
            - lambda: |-
                id(blink_running) = true;
                id(blink_on) = true;
            - if:
                condition:
                  lambda: 'return id(status_active);'
                then:
                  - light.turn_on: light_green
                  - light.turn_off: light_red
                else:
                  - light.turn_on: light_red
                  - light.turn_off: light_green
          else:
            - lambda: |-
                id(blink_running) = false;
                id(blink_on) = false;

  - id: stop_status_blink
    then:
      - lambda: |-
          id(blink_running) = false;
          id(blink_on) = false;
      - script.execute: apply_status_state

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return id(blink_running);'
          then:
            - if:
                condition:
                  lambda: 'return id(status_led_enabled);'
                then:
                  - if:
                      condition:
                        lambda: 'return id(blink_on);'
                      then:
                        - light.turn_off: light_red
                        - light.turn_off: light_green
                        - lambda: |-
                            id(blink_on) = false;
                      else:
                        - if:
                            condition:
                              lambda: 'return id(status_active);'
                            then:
                              - light.turn_on: light_green
                              - light.turn_off: light_red
                            else:
                              - light.turn_on: light_red
                              - light.turn_off: light_green
                        - lambda: |-
                            id(blink_on) = true;
                else:
                  - lambda: |-
                      id(blink_running) = false;
                      id(blink_on) = false;
                  - script.execute: apply_status_state

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO34
      inverted: true
    name: "Taster Dach"
    on_press:
      then:
        - cover.toggle: cover_Dach

  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: "Taster Sonstiges"
    on_press:
      then:
        - cover.toggle: cover_Dach
        - cover.toggle: cover_Tur

  - platform: gpio
    pin:
      number: GPIO35
      inverted: true
    name: "Taster Tür"
    on_press:
      then:
        - cover.toggle: cover_Tur

  - platform: gpio
    pin:
      number: GPIO36
      inverted: true
    name: "Taster Status"
    on_press:
      then:
        - script.execute: toggle_status

  - platform: template
    name: "Status"
    id: status_binary
    lambda: |-
      return id(status_active);

switch:
  - platform: gpio
    pin: GPIO04
    name: "Switch Dach A"
    id: switch_Dach_A
    entity_category: config

  - platform: gpio
    pin: GPIO16
    name: "Switch Dach B"
    id: switch_Dach_B
    entity_category: config

  - platform: gpio
    pin: GPIO02
    name: "Switch Schiebetür A"
    id: switch_Schiebetur_A
    entity_category: config

  - platform: gpio
    pin: GPIO00
    name: "Switch Schiebetür B"
    id: switch_Schiebetur_B
    entity_category: config

  - platform: gpio
    pin: GPIO25
    name: "Heizung"
    id: switch_heating
    entity_category: config
    device_class: outlet

  - platform: gpio
    pin: GPIO26
    id: switch_lamp
    name: "Lampe"
    entity_category: config
    device_class: outlet

  - platform: gpio
    pin: GPIO23
    name: "Power Kameras"
    device_class: outlet
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Status Aktiv Schalter"
    id: status_switch
    optimistic: true
    lambda: |-
      return id(status_active);
    turn_on_action:
      - script.execute:
          id: set_status
          new_state: true
    turn_off_action:
      - script.execute:
          id: set_status
          new_state: false

  - platform: template
    name: "Status LED Schalter"
    id: status_led_switch
    optimistic: true
    lambda: |-
      return id(status_led_enabled);
    turn_on_action:
      - script.execute:
          id: set_led_enabled
          new_state: true
    turn_off_action:
      - script.execute:
          id: set_led_enabled
          new_state: false

  - platform: template
    name: "Prison Mode"
    id: prison_mode_switch
    optimistic: true
    lambda: |-
      return id(prison_mode);
    turn_on_action:
      - lambda: |-
          id(prison_mode) = true;
      - cover.stop: cover_Tur
      - cover.close: cover_Tur
    turn_off_action:
      - lambda: |-
          id(prison_mode) = false;

cover:
  - platform: time_based
    id: cover_Tur
    name: "Tür"
    open_action:
      - if:
          condition:
            lambda: 'return !id(prison_mode);'
          then:
            - script.execute: start_status_blink
            - switch.turn_on: switch_Schiebetur_A
            - switch.turn_off: switch_Schiebetur_B
    open_duration: 15s
    close_action:
      - script.execute: start_status_blink
      - switch.turn_off: switch_Schiebetur_A
      - switch.turn_on: switch_Schiebetur_B
    close_duration: 15s
    stop_action:
      - script.execute: stop_status_blink
      - switch.turn_off: switch_Schiebetur_A
      - switch.turn_off: switch_Schiebetur_B
    assumed_state: true
    device_class: door

  - platform: time_based
    id: cover_Dach
    name: "Dach"
    open_action:
      - script.execute: start_status_blink
      - switch.turn_off: switch_Dach_A
      - switch.turn_on: switch_Dach_B
    open_duration: 7s
    close_action:
      - script.execute: start_status_blink
      - switch.turn_on: switch_Dach_A
      - switch.turn_off: switch_Dach_B
    close_duration: 7s
    stop_action:
      - script.execute: stop_status_blink
      - switch.turn_off: switch_Dach_A
      - switch.turn_off: switch_Dach_B
    assumed_state: true
    device_class: window

i2c:
  sda: GPIO21
  scl: GPIO22

sensor:
  - platform: bme280_i2c
    temperature:
      name: "Temperatur"
      id: bme280_temperature
      oversampling: 8x
      filters:
        - median:
            window_size: 7
            send_every: 3
            send_first_at: 3
        - lambda: |-
            if (x < -10 || x > 60) return NAN;
            return x;
        - filter_out: NAN
    humidity:
      name: "rel. Feuchtigkeit"
      id: bme280_humidity
      oversampling: 8x
      filters:
        - median:
            window_size: 7
            send_every: 3
            send_first_at: 3
        - lambda: |-
            if (x < 0 || x > 100) return NAN;
            return x;
        - filter_out: NAN
    address: 0x76

output:
  - platform: gpio
    pin: GPIO1
    id: gpio_led_red

  - platform: gpio
    pin: GPIO15
    id: gpio_led_green

light:
  - platform: binary
    name: "rote Lampe"
    output: gpio_led_red
    id: light_red
    internal: true
    on_turn_on:
      - light.turn_off: light_green

  - platform: binary
    name: "grüne Lampe"
    output: gpio_led_green
    id: light_green
    internal: true
    on_turn_on:
      - light.turn_off: light_red

climate:
  - platform: thermostat
    name: "Temperaturregelung"
    sensor: bme280_temperature
    id: climatecontroll
    humidity_sensor: bme280_humidity
    min_cooling_off_time: 60s
    min_cooling_run_time: 60s
    min_heating_off_time: 60s
    min_heating_run_time: 60s
    min_idle_time: 3s
    heat_cool_mode: true
    visual:
      min_temperature: 0
      temperature_step: 0.5
      min_humidity: 30%
      max_humidity: 99%
    cool_action:
      - switch.turn_off: switch_lamp
      - switch.turn_off: switch_heating
      - cover.open: cover_Dach
      - cover.open: cover_Tur
    heat_action:
      - switch.turn_on: switch_heating
      - cover.close: cover_Dach
    off_mode:
      then:
        - switch.turn_off: switch_lamp
        - switch.turn_off: switch_heating
    idle_action:
      - cover.close: cover_Dach
      - switch.turn_off: switch_heating
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: 15 °C
        default_target_temperature_high: 25 °C

button:
  - platform: restart
    name: "Gartenhaus Neustart"
    entity_category: diagnostic