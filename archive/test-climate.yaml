esphome:
  name: test-climate
  friendly_name: test Climate

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "0evTFm71qUGgTF9OPqD3/p6B6Py7RG0LubHR+7gy63s="

ota:
  - platform: esphome
    password: "302701773a3dace5ff65ca779cec3da8"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Test-Climate Fallback Hotspot"
    password: "FiT8tBy1GGOC"

captive_portal:

sensor:
  - platform: template
    name: "Template Sensor"
    id: template_sensor
    lambda: |-
        return 42.0;

climate:
  - platform: thermostat
    name: "Temperaturregelung"
    sensor: template_sensor
    id: climatecontroll
    min_cooling_off_time: 300s
    min_cooling_run_time: 300s
    min_heating_off_time: 300s
    min_heating_run_time: 300s
    min_fanning_off_time: 300s
    min_fanning_run_time: 300s
    min_idle_time: 30s
    visual: 
      min_temperature: 5
    cool_action:
      - logger.log: "Climate - Ich kühle"
    heat_action:
      - logger.log: "Climate - Ich heize"
    fan_only_action:
      - logger.log: "Climate - Ich lüfte"
    idle_action:
      - logger.log: "Climate - Ich chille"
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: 15 °C
        default_target_temperature_high: 25 °C
button:
  - platform: template
    name: "Lüften"
    on_press:
      - lambda: !lambda |-
          id(climatecontroll).mode == CLIMATE_MODE_FAN_ONLY;
      #- delay: !lambda "return id(duration_ventilate).state * 1000 * 60;"